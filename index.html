<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="居家训练">
<link rel="manifest" href="workout_manifest.json">
<title>🏋️ 居家增肌塑形 · 体态矫正 · 完整训练计划</title>
<style>
:root {
    --bg:#0f0f1a; --card:#1a1a2e; --card2:#16213e; --gold:#e2b04a; --gold2:#c9952e;
    --green:#4caf84; --red:#e0556a; --blue:#5b9bd5; --purple:#b07cd8; --orange:#e8844a;
    --text:#e8e6e3; --muted:#9a9a9a; --border:#2a2a3e;
    --push:#e0556a; --pull:#5b9bd5; --legs:#4caf84; --posture:#b07cd8; --rest:#666;
    --warmup:#e8844a;
    --touch-target: 44px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
/* 移动端安全区域 */
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
header{background:linear-gradient(135deg,var(--card) 0%,var(--card2) 100%);padding:clamp(12px,3vw,18px) clamp(12px,3vw,20px);text-align:center;border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
header h1{font-size:clamp(1.1em,3vw,1.5em);color:var(--gold)}
header p{font-size:clamp(0.72em,2vw,0.85em);color:var(--muted);margin-top:2px}
/* 导航 - 触摸优化 */
nav#weekNav{display:flex;gap:2px;padding:clamp(6px,2vw,10px);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;flex-wrap:wrap;justify-content:center}
nav#weekNav::-webkit-scrollbar{display:none}
nav#weekNav button{min-width:clamp(38px,10vw,56px);min-height:var(--touch-target);padding:clamp(4px,1.5vw,8px) clamp(4px,1.5vw,8px);border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:8px;cursor:pointer;font-size:clamp(0.7em,2vw,0.85em);white-space:nowrap;transition:all .2s;flex-shrink:0;touch-action:manipulation}
nav#weekNav button.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}
nav#weekNav button.rest{color:var(--muted);opacity:.5;cursor:default}
nav#weekNav button:not(.rest):active{transform:scale(.95)}
/* 主标签切换 - 触摸优化 */
nav#kbNav{display:flex;gap:2px;padding:clamp(4px,1.5vw,8px);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;flex-wrap:wrap;justify-content:center}
nav#kbNav button{min-height:var(--touch-target);padding:clamp(6px,2vw,10px) clamp(10px,3vw,16px);border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:8px;cursor:pointer;font-size:clamp(0.72em,2vw,0.85em);white-space:nowrap;transition:all .2s;flex-shrink:0;touch-action:manipulation}
nav#kbNav button.active{background:var(--card2);border-color:var(--gold);color:var(--gold);font-weight:700}
nav#kbNav button:active{transform:scale(.95)}
#content{max-width:800px;margin:0 auto;padding:clamp(8px,2vw,16px)}
.section{background:var(--card);border-radius:12px;padding:clamp(12px,3vw,20px);margin-bottom:clamp(10px,2vw,16px);border:1px solid var(--border)}
.section h2{font-size:clamp(0.95em,2.5vw,1.15em);margin-bottom:clamp(8px,2vw,12px);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{display:inline-block;padding:clamp(2px,1vw,4px) clamp(6px,2vw,10px);border-radius:20px;font-size:clamp(0.65em,1.8vw,0.75em);font-weight:700;white-space:nowrap}
.b-push{background:var(--push);color:#fff}.b-pull{background:var(--pull);color:#fff}.b-legs{background:var(--legs);color:#fff}.b-posture{background:var(--purple);color:#fff}.b-warmup{background:var(--warmup);color:#fff}.b-gold{background:var(--gold);color:#000}.b-info{background:var(--blue);color:#fff}.b-injury{background:var(--red);color:#fff}.b-dorm{background:var(--green);color:#fff}
.day-label{font-size:clamp(0.75em,2vw,0.88em);color:var(--muted);margin-bottom:clamp(8px,2vw,12px)}
/* 练习列表 - 触摸优化 */
.exercise-list{list-style:none}
.exercise-item{display:flex;align-items:center;padding:clamp(8px,2vw,12px);margin:clamp(3px,1vw,6px) 0;background:var(--card2);border-radius:8px;cursor:pointer;min-height:var(--touch-target);gap:clamp(8px,2vw,12px);transition:all .2s;touch-action:manipulation;border:1px solid transparent;flex-wrap:wrap}
.exercise-item:hover{border-color:#333}
.exercise-item:active{transform:scale(.98)}
.exercise-item.done{opacity:.45;text-decoration:line-through;text-decoration-color:var(--muted)}
.ex-left{display:flex;align-items:center;gap:clamp(6px,1.5vw,10px);flex:0 0 auto}
.ex-check{width:clamp(22px,5vw,26px);height:clamp(22px,5vw,26px);border:2px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:clamp(0.7em,1.8vw,0.85em);transition:all .2s;flex-shrink:0}
.exercise-item.done .ex-check{background:var(--green);border-color:var(--green);color:#fff}
.ex-name{font-weight:600;font-size:clamp(0.82em,2.2vw,0.95em);white-space:nowrap}
.ex-info{font-size:clamp(0.68em,1.8vw,0.78em);color:var(--muted);flex:1;min-width:0;text-align:right}
/* 提示框 */
.tip-box{padding:clamp(10px,2vw,14px);border-radius:8px;margin:clamp(8px,2vw,12px) 0;font-size:clamp(0.72em,1.8vw,0.85em);line-height:1.6}
.tip-box.good{background:rgba(76,175,132,.12);border-left:3px solid var(--green)}
.tip-box.warn{background:rgba(224,85,106,.12);border-left:3px solid var(--red)}
.tip-box.info{background:rgba(91,155,213,.12);border-left:3px solid var(--blue)}
.tip-box.dorm{background:rgba(76,175,132,.08);border-left:3px solid var(--green)}
.tip-box.injury{background:rgba(224,85,106,.08);border-left:3px solid var(--red)}
/* 知识卡片 */
.kb-card{background:var(--card2);padding:clamp(12px,3vw,18px);border-radius:8px;margin:clamp(8px,2vw,12px) 0;border:1px solid var(--border)}
.kb-card h4{color:var(--gold);margin-bottom:6px;font-size:clamp(0.85em,2.2vw,1em)}
.kb-card ul,.kb-card ol{padding-left:clamp(16px,4vw,24px)}
.kb-card li{margin:4px 0;font-size:clamp(0.72em,1.8vw,0.85em)}
.highlight{background:rgba(226,176,74,.2);padding:1px 5px;border-radius:3px;color:var(--gold);font-weight:600}
.kf{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.85em;margin:2px;background:rgba(76,175,132,.15);color:var(--green)}
.kf-bad{background:rgba(224,85,106,.15);color:var(--red)}
details{margin:clamp(6px,1.5vw,10px) 0;background:var(--card2);border-radius:8px;overflow:hidden}
details summary{padding:clamp(10px,2.5vw,14px);cursor:pointer;font-size:clamp(0.8em,2vw,0.9em);touch-action:manipulation;min-height:var(--touch-target);display:flex;align-items:center;user-select:none}
details .inner{padding:clamp(8px,2vw,16px);font-size:clamp(0.72em,1.8vw,0.82em);line-height:1.75;border-top:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:clamp(0.68em,1.7vw,0.8em);overflow-x:auto;display:block}
th,td{padding:clamp(6px,1.5vw,10px);border:1px solid var(--border);text-align:left}
th{background:var(--card2);color:var(--gold);white-space:nowrap}
/* 按钮 */
.btn{display:inline-block;padding:clamp(8px,2vw,12px) clamp(16px,4vw,24px);background:var(--red);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:clamp(0.75em,2vw,0.88em);min-height:var(--touch-target);touch-action:manipulation}
/* section高亮边界 */
.section.injury-section{border-left:3px solid var(--red)}
.section.dorm-section{border-left:3px solid var(--green)}
/* 响应式表格 */
@media screen and (max-width:480px){
    table{font-size:0.72em}
    .ex-info{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .exercise-item{gap:6px}
    header h1{font-size:1.05em}
}
@media screen and (min-width:768px){
    #content{max-width:820px}
}
</style>
</head>
<body>

<header>
<h1>🏋️ 居家增肌塑形 · 体态矫正 · 完整训练计划</h1>
<p>173cm · 60kg · 18岁男性｜宿舍/居家训练｜圆肩驼背头前伸矫正｜胸肌激活专属方案</p>
</header>

<nav id="weekNav"></nav>
<nav id="kbNav">
    <button data-tab="training" class="active">📋 每日训练</button>
    <button data-tab="dorm">🏠 宿舍动作</button>
    <button data-tab="injury">🩹 肩伤康复</button>
    <button data-tab="qa">❓ 35问</button>
    <button data-tab="terms">📖 术语</button>
    <button data-tab="guide">📘 指南</button>
</nav>

<div id="content"></div>

<script>
// ======================== DATA ========================
const DAYS=['周一 推力日','周二 拉力日','周三 腿+核心','周四 推力日','周五 拉力日','周六 体态矫正','☀️ 周日 休息'];

// 统一热身
const WARMUP_BASE=[
    {name:'肩绕环 ×20',info:'正向10次+反向10次',tip:'手臂画大圈，感受肩关节全方位活动'},
    {name:'俯身肩胛收缩 2×15',info:'俯身45°，肩胛骨往中间夹',tip:'只用肩胛骨发力，手臂不动。想象后背夹住一枚硬币'},
    {name:'墙天使 2×12',info:'背靠墙，手臂贴墙做W→上举',tip:'全程手腕+手肘+肩膀贴墙。这既是热身也是对圆肩的矫正'},
    {name:'下巴回收 2×10',info:'头中立→下巴水平后移，像缩头',tip:'不是低头！下巴水平后移，感觉喉咙后方深层发力'},
];

// 周三腿日额外热身
const WARMUP_LEG=[
    {name:'原地慢跑 1分钟',info:'轻度，不跳太高',tip:'目的是升温，不是冲刺'},
    {name:'髋关节转圈 10圈',info:'手扶墙/桌，抬腿画圈',tip:'画圈越大越好，感受髋关节润滑'},
    {name:'动态弓步 10次',info:'前腿弓步→后腿膝盖接近地面→交替',tip:'上身保持直立，不往前倾'},
    {name:'空气深蹲 15次',info:'无负重，标准深蹲',tip:'手前平举保持平衡，感受臀部往后坐'},
    {name:'直腿踢腿 10次/腿',info:'站姿，直腿前踢',tip:'激活腘绳肌和后链'},
];

// 胸肌激活（推力日练前必做）
const CHEST_ACTIVATE=[
    {name:'双手互推（等长收缩）3×10秒',info:'双手在胸前合十→用力互推→感受胸肌收紧',tip:'手掌互推时想象"把胸肌往中间挤压"。10秒全力推，然后放松5秒'},
    {name:'门框/墙角胸肌轻拉伸 2×20秒',info:'手臂弯曲90°放门框→身体前移→胸肌轻微拉伸感',tip:'不痛，只到有轻微拉扯感的位置。拉伸后做俯卧撑胸感更好'},
    {name:'俯卧撑预备位保持 2×15秒',info:'俯卧撑起始位→肩胛下沉+后缩→保持身体直线',tip:'这是"静态激活"——让身体提前记住正确姿势'},
];

// ======================== 训练日计划 ========================
const PLANS={
    0:{ // 周一 推力日
        dayLabel:'推力日 · 胸 + 肩（前/中束）',
        badge:'b-push',badgeText:'推力',
        chestActivate:true,
        exercises:[
            {name:'靠墙俯卧撑 4×15',info:'手比肩宽·3-1-1节奏·夹胸',tip:'手距=1.5倍肩宽 | 肘45°朝外 | 慢下3秒 | 推到顶时"夹胸" | 身体越直立越简单',feel:'胸大肌中部（乳沟两侧区域）有轻微拉伸-收缩感。如果三头肌酸>胸肌酸→手往宽放、慢下来、先做激活'},
            {name:'跪式俯卧撑 4×10',info:'手比肩宽·3-1-1·底部停1秒',tip:'核心收紧不塌腰 | 手位置：胸口正下方略偏外 | 推到顶时想象"胸肌往中间挤" | 肩胛骨在底部往中间收',feel:'下放时胸肌有明显拉伸感（像橡皮筋被拉开），推起时胸肌酸胀发热。正确发力时胸比三头先累'},
            {name:'前推式俯卧撑 3×8',info:'肩略超手掌·练前锯肌+上胸',tip:'身体整体前移2-3cm→肩超过手掌→推。前移不塌腰！',feel:'腋下侧方（前锯肌区域）酸胀，上胸锁骨下方有发力感。这是对抗圆肩的关键肌肉'},
            {name:'靠墙单边推 3×10/侧',info:'侧身单手推墙·孤立单侧胸肌',tip:'身体侧面朝墙→单手推→身体不旋转！',feel:'单侧胸肌孤立发力，核心抗旋收紧。如果身体转动=核心没收紧'},
        ],
        tips:[
            {type:'good',text:'<strong>✅ 推力日核心：</strong>慢速离心(3秒)、手比肩宽、夹胸意识。如果胸没感觉→重新做胸肌激活再开始。质量>数量。'},
            {type:'warn',text:'<strong>⚠️ 肩伤注意：</strong>如果你左肩仍有不适，靠墙俯卧撑和靠墙单边推最安全（低负荷）。跪式俯卧撑降到2组。前推式俯卧撑可用跪式版。任何时候出现刺痛→立刻停止该动作。'},
        ]
    },
    1:{ // 周二 拉力日
        dayLabel:'拉力日 · 背 + 后肩 + 后链',
        badge:'b-pull',badgeText:'拉力',
        exercises:[
            {name:'俯卧超人 4×12',info:'同时抬胸+手+脚·2秒保持',tip:'眼睛看地面！不看前方。起时想象"后背和臀同时收缩"。',feel:'整条后链（背→臀→腘绳肌）同时收紧的感觉。不要猛抬头——头只是脊柱的自然延伸'},
            {name:'俯身 Y-T 5轮',info:'Y形10次+T形10次·拇指朝上',tip:'用肩胛骨带动手臂，不是手臂自己拉。沉肩不耸肩。',feel:'Y形：肩胛骨内侧下方（下斜方肌区域）酸胀。T形：肩胛骨之间（菱形肌区域）酸胀。都不应该是肩膀顶端酸！'},
            {name:'反向平板支撑 3×15-30秒',info:'弯腿版·顶髋·肩下沉·下巴收',tip:'弯腿版（脚踩地膝盖弯曲）对颈更友好。下巴微收看斜上方，不是后仰。',feel:'臀肌收紧+后链整体紧张。如果后脑勺闷→下巴再收一点、肩再沉一点、降回弯腿版'},
            {name:'农夫行走 4×30秒',info:'提水桶/书包·肩下沉·核心收紧',tip:'想象头顶被线拉高→肩下沉（不要耸到耳朵）→正常行走。',feel:'全身稳定感，核心持续收紧，前臂酸胀。走完30秒应该感觉"全身都参与了"'},
        ],
        postRoutine:[
            {name:'① 枕下肌按摩 1分钟',info:'仰卧·手指按后脑勺下方凹陷处',tip:'不是用力掐！找到枕骨下方两指宽的凹陷→用指腹轻轻打圈。能忍受的力度即可。'},
            {name:'② 后颈拉伸 3×20秒',info:'坐姿·头缓慢前倾·手轻扶后脑',tip:'只用手自身重量辅助，不强拉。感觉后颈有拉伸感即可。'},
            {name:'③ 侧颈拉伸 每侧3×15秒',info:'头向一侧倾斜（耳靠肩，不耸肩）',tip:'对侧手可轻辅助。注意：倾斜侧的肩膀不能耸起来。'},
            {name:'④ 下巴回收 10次',info:'头中立→下巴水平后移',tip:'主动放松——激活深层颈屈肌通过"交互抑制"帮助放松枕下肌。'},
        ],
        tips:[
            {type:'good',text:'<strong>✅ 拉力日核心：</strong>眼睛始终看地面、下巴微收、用肩胛骨启动、不抬头。练后必须做颈部放松四步。'},
            {type:'dorm',text:'<strong>🏠 宿舍替代动作：</strong>想增加训练量？看"宿舍动作"标签页——毛巾划船、弹力带后拉、俯身飞鸟等都是绝佳补充。'},
        ]
    },
    2:{ // 周三 腿+核心
        dayLabel:'腿日 · 下肢 + 核心稳定',
        badge:'b-legs',badgeText:'腿+核心',
        legWarmup:true,
        exercises:[
            {name:'深蹲 5×20',info:'自重·臀后坐·背平直',tip:'重心在脚跟，膝盖朝脚尖方向，不要内扣。下3秒→停1秒→起2秒。',feel:'大腿前侧（股四头肌）和臀部酸胀。如果膝盖痛→检查膝是否超过脚尖太多、或膝内扣'},
            {name:'保加利亚分腿蹲 4×12/侧',info:'后脚架椅子/床沿·前腿发力',tip:'前膝对齐脚尖、不内扣。身体微微前倾让臀参与更多。手扶墙保持平衡。',feel:'前腿臀大肌+股四头肌酸胀，后腿髋前侧（髋屈肌）有拉伸感'},
            {name:'臀桥 4×20',info:'先夹臀再顶髋·顶点停2秒',tip:'不是"用腰往上顶"！先主动收紧臀部→然后用臀把髋顶起来。',feel:'臀部收紧酸胀（像有人掐住你的臀部两侧）。如果腰酸→说明用腰顶了，放低重新来'},
            {name:'平板支撑 4×60秒',info:'身体直线·看地面·均匀呼吸',tip:'核心收紧（像有人要打你肚子）→不塌腰不撅臀→均匀呼吸绝不屏气。',feel:'整个核心区域（腹横肌、腹直肌、腹斜肌）均匀收紧发热。腰不酸=正确'},
            {name:'死虫式 3×12',info:'慢速·腰始终贴地·对侧手脚',tip:'手轻推膝盖→感受深层腹部收紧。如果腰拱起来→减小幅度或做单侧版。',feel:'深层腹部收紧感（腹横肌），像一条宽腰带勒紧。腰始终贴地——这是检验标准'},
        ],
        tips:[
            {type:'good',text:'<strong>✅ 腿日核心：</strong>膝盖不内扣、腰不酸、臀发力、核心始终收紧。深蹲数量多=耐力和动作模式打造阶段。'},
        ]
    },
    3:{ // 周四 推力日（同周一）
        dayLabel:'推力日 · 胸 + 肩（前/中束）',
        badge:'b-push',badgeText:'推力',

<li>保持2秒→缓慢放松→下巴回到中立</li></ol>
<p><strong>正确与错误的区别：</strong>下巴回收=下巴在水平面上后移（耳垂相对肩峰后移）。低头=下巴向下+颈椎屈曲。你可以在镜子前练习：下巴回收应该让你看起来"脖子变直了"，而不是"头变低了"。</p>
<p><strong>训练频率：</strong>2-3组×10-15次。这个动作不仅矫正日做——每天都可以做几次。坐久了→做5次→即时纠正头位。</p>` },
    { q:'14. 什么是俯身 Y-T？',
      a:`<p><strong>Y-T（或称Y-T-W-L，我们简化用Y和T）</strong>是俯身状态下手臂呈Y形和T形上抬的训练动作，主要目标是激活上背部和中背部的姿势肌群。</p>
<p><strong>起始姿势：</strong>微俯身（髋部铰链，约45°）→背部平直→手臂自然下垂→拇指朝上→肩胛骨预先后缩。</p>
<p><strong>Y形：</strong>手臂向斜上方抬起，身体从上方看呈Y字形。手臂与身体夹角约30-45°。重点：<strong>用肩胛骨带动手臂上抬</strong>，不是用手臂自己拉。主要激活下斜方肌+后三角肌。</p>
<p><strong>T形：</strong>手臂向两侧水平抬起，身体呈T字形。拇指始终朝上（外旋）。重点：<strong>肩胛骨往中间夹</strong>。主要激活菱形肌+中斜方肌+后三角肌。</p>` },
    { q:'15. Y和T分别练哪里？',
      a:`<table><tr><th>动作</th><th>主要目标肌群</th><th>功能</th></tr>
<tr><td>Y形（斜上举）</td><td>下斜方肌 + 后三角肌 + 冈下肌</td><td>肩胛上旋稳定 + 改善圆肩 + 肩外旋控制</td></tr>
<tr><td>T形（平举）</td><td>菱形肌 + 中斜方肌 + 后三角肌</td><td>肩胛后缩 + 挺胸 + 对抗圆肩</td></tr></table>
<p><strong>两个动作互补：</strong>Y侧重上下方向的肩胛控制，T侧重水平方向的肩胛后缩。两者结合才能全面覆盖上背部的姿势肌群。</p>` },
    { q:'16. 如何正确练背而不让脖子代偿？',
      a:`<p><strong>颈部代偿的核心机制：</strong>当你做背部动作时抬头看前方，实际上是在用颈部伸肌（主要是头夹肌、颈夹肌、头半棘肌）来"辅助"身体后伸。这些肌肉反过来紧张收缩，压迫枕下肌群和枕骨区域→导致后脑勺闷、紧、不舒服。</p>
<p><strong>五条铁律：</strong></p><ol>
<li><span class="highlight">眼睛始终看地面</span>（不是看镜子，不是看前方）。在地上放一个标记点盯着它。</li>
<li><span class="highlight">头完全中立</span>——想象头顶被一根线轻轻上拉，下巴微收</li>
<li><span class="highlight">不抬头</span>——哪怕你觉得"抬头更帅"或"抬头能看清楚"</li>
<li><span class="highlight">舌头轻抵上颚</span>——这能帮助放松下颌和颈前肌肉</li>
<li><span class="highlight">动作前先做下巴回收</span>——每次开始一组前都做一次</li></ol>` },
    { q:'17. 为什么练背后后脑勺会闷、紧、不舒服？',
      a:`<p><strong>解剖学原因：</strong>后脑勺下方有一组叫做<strong>枕下肌</strong>的小肌肉（4对）。它们位于颅骨底部和第一、二颈椎之间。含有极高密度的肌梭（本体感受器）和丰富的血管神经。</p>
<p>当你做背部动作时抬头或头部前伸，枕下肌就会过度收缩→压迫枕大神经→产生：</p><ul>
<li>后脑勺压迫感/闷感</li>
<li>牵涉性头痛（枕下肌紧张→枕大神经受压→后脑勺+头顶闷痛）</li>
<li>颈部活动受限</li></ul>
<p><strong>结合你的情况：</strong>你本身有头前伸→枕下肌已经长期处于缩短紧张状态→练背时抬头进一步收缩它们→症状加重。这就是为什么必须做枕下肌放松和下巴回收。</p>` },
    { q:'18. 如何放松后脑勺和后颈？',
      a:`<p><strong>①枕下肌按摩（最重要）：</strong></p><ul>
<li>仰卧→找到后脑勺与脖子连接处的凹陷（枕骨下方）</li>
<li>用两手指腹轻轻按进去→感觉到一串小肌肉</li>
<li>以能忍受的力度缓慢打圈按摩1分钟</li>
<li>也可以用网球放在那里，靠墙或躺下用体重轻压</li></ul>
<p><strong>②后颈拉伸：</strong>坐姿→头缓慢前倾→手轻扶后脑辅助（不要用力拉）→感觉后颈有拉伸感→保持20秒×3组。</p>
<p><strong>③侧颈拉伸：</strong>头向一侧倾斜（耳朵靠向肩膀，不要耸肩）→对侧手轻辅助→保持15秒×3组。</p>
<p><strong>④下巴回收（主动放松）：</strong>做10次—激活深层颈屈肌，通过"交互抑制"帮助放松枕下肌。</p>` },
    { q:'19. 什么是枕下肌？',
      a:`<p><strong>枕下肌（Suboccipital Muscles）</strong>是位于颅骨底部和上颈椎（C1-C2）之间的4对深层小肌肉：头后大直肌、头后小直肌、头上斜肌、头下斜肌。</p>
<p><strong>为什么它们重要：</strong></p><ul>
<li>含有全身最高密度的肌梭（本体感觉器官），是头部位置感知的关键</li>
<li>长期头前伸会导致它们持续缩短→紧张→压迫枕大神经→后脑勺/头顶闷痛</li>
<li>它们与眼球运动联动——你的眼睛往哪看，枕下肌就会微微调整。所以练背时"看地面"能帮助它们放松</li></ul>` },
    { q:'20. 什么是胸椎活动？',
      a:`<p><strong>胸椎（Thoracic Spine，T1-T12）</strong>是脊柱的中段，连接着肋骨。胸椎活动度是指胸椎在屈曲、伸展、旋转和侧屈方向上的活动范围。</p>
<p><strong>为什么你的计划里有胸椎活动训练：</strong></p><ul>
<li>长期驼背→胸椎被锁在过度后凸的位置→活动度下降→僵硬</li>
<li>胸椎僵硬→肩胛骨无法在正常的胸廓上滑动→肩胛不稳→上肢发力模式异常</li>
<li>胸椎僵硬→腰椎和颈椎被迫代偿更多的活动→下背痛+颈部问题加重</li></ul>
<p><strong>你的胸椎活动练习：</strong>猫牛式（屈伸）、穿针引线（旋转）、胸椎伸展（伸展）——覆盖胸椎的全部活动维度。</p>` },
    { q:'21. 为什么胸椎僵硬会导致体态问题？',
      a:`<p>连锁反应：<strong>胸椎僵硬（后凸）→</strong>为了保持视线水平，颈椎被迫过度伸展（头前伸）→同时肩胛骨无法在僵硬的胸廓上正常后缩→肩胛骨前移外展→圆肩形成→上交叉综合征完全建立。</p>
<p>所以改善体态不能只做肩部训练，<strong>胸椎活动度是根源之一</strong>。</p>` },
    { q:'22. 反向平板支撑为什么会让后脑勺不舒服？',
      a:`<p><strong>原因：</strong>反向平板支撑面部朝上→这个姿势需要颈部屈肌保持头部稳定。如果你的深层颈屈肌较弱（头前伸者通常如此），身体会"借用"枕下肌和胸锁乳突肌来代偿→枕下肌紧张→后脑勺不适。另外如果下巴上抬（朝向天花板）、头部后仰，会直接压缩枕下区域。</p>
<p><strong>解决：</strong>弯腿版（脚踩地膝盖弯曲）→下巴微收→视线看斜上方（不是正上方）→肩胛下压。</p>` },
    { q:'23. 如何正确做反向平板支撑？',
      a:`<p><strong>步骤：</strong></p><ol>
<li>坐姿→手放臀部后方，手指朝前或朝外（朝外对肩更友好）</li><li>腿伸直→脚跟着地</li>
<li>收紧臀部→顶髋→身体成一条直线</li><li>肩胛下压（沉肩，不耸肩到耳朵）</li><li>下巴微收，看斜上方</li></ol>
<p><strong>关键检查点：</strong></p><ul>
<li><span class="kf">髋不塌</span>——全程臀部收紧顶高</li>
<li><span class="kf">肩下沉</span>——远离耳朵</li>
<li><span class="kf">下巴收</span>——不是后仰</li>
<li><span class="kf kf-bad">腰不酸</span>——腰酸=髋太低或核心没收紧</li></ul>
<p><strong>降阶版：</strong>弯腿→脚踩地→膝盖弯曲90°→只要求髋部顶起到膝盖-髋-肩一条线。这个版本颈部压力更小。</p>` },
    { q:'24. 什么是前推式俯卧撑？',
      a:`<p><strong>前推式俯卧撑（Forward-Lean Push-Up）</strong>是在标准俯卧撑基础上，将身体重心前移，让肩膀超过手掌的变式。这个微小的前移把更多负荷转移到了前锯肌、上胸和肩部稳定肌群。</p>
<p>在你的计划中，前锯肌是"翼状肩胛"和圆肩的对抗肌，对肩胛稳定至关重要。</p>` },
    { q:'25. 前推式俯卧撑练哪里？',
      a:`<p><strong>主要目标：前锯肌（Serratus Anterior）</strong></p>
<p>前锯肌是位于腋下到肋骨侧面的扇形肌肉，功能是让肩胛骨前伸和上旋。被称为"拳击手肌肉"。</p>
<p><strong>次要目标：</strong>上胸、三角肌前束、核心稳定肌群。</p>
<p><strong>为什么你需要：</strong>圆肩者通常前锯肌薄弱→加强前锯肌→肩胛骨能正确贴合在胸廓上→肩胛稳定提升→胸肌发力感改善。</p>` },
    { q:'26. 如何避免俯卧撑肩膀代偿？',
      a:`<ul>
<li><span class="highlight">不要耸肩：</span>推起时保持肩膀远离耳朵</li>
<li><span class="highlight">肘角45°：</span>完全张开到90°会让肩关节前侧承受巨大压力</li>
<li><span class="highlight">推到顶不要过度前伸肩胛：</span>（变成"翼状肩"姿势）这会拉扯你的肩关节前侧——可能正是你左肩被"扯到"的原因</li>
<li><span class="highlight">不锁死肘关节：</span>推到顶留微弯，保持肌肉张力</li>
<li><span class="highlight">离心控制：</span>下放时"掉下去"=肩关节承受冲击。慢下3秒完全避免</li></ul>` },
    { q:'27. 如何避免练背时耸肩？',
      a:`<p><strong>耸肩=上斜方肌过度活跃。</strong></p><ol>
<li>动作前先"沉肩"：主动把肩膀往下、往后压</li>
<li>想象"肩胛骨往屁股方向滑"——激活下斜方肌</li>
<li>做Y-T时，如果肩膀往上缩=耸肩。正确感觉是肩胛骨往中间夹+微微下移</li>
<li>对着镜子练或录像自查</li>
<li>控制不住耸肩→减少活动范围→先做小幅度的肩胛收缩</li></ol>` },
    { q:'28. 如何避免脖子参与发力？',
      a:`<ul>
<li><span class="highlight">背部动作：</span>眼睛看地面，下巴微收，不抬头</li>
<li><span class="highlight">俯卧撑：</span>不要抬头看前方。头是脊柱的自然延伸</li>
<li><span class="highlight">平板支撑：</span>看地面，头不后仰不低头</li>
<li><span class="highlight">深蹲：</span>视线看前方地面约2米处，不前伸下巴</li></ul>` },
    { q:'29. 如何正确热身？',
      a:`<p><strong>热身三阶段：</strong></p>
<p><strong>①轻度升温（1-2min）：</strong>原地踏步/慢跑→提升核心温度和血液流动。</p>
<p><strong>②关节活动（2-3min）：</strong>肩绕环、髋转圈、脊柱猫牛式→润滑关节。</p>
<p><strong>③专项激活（3-5min）：</strong>推力日→墙天使+肩胛收缩+胸肌激活+肩袖外旋。拉力日→俯身肩胛收缩+轻量Y-T。腿日→动态弓步+空气深蹲。你的热身已覆盖三阶段。</p>
<p><strong>冷肌肉直接上强度=100%代偿+受伤风险。尤其你有肩伤史。</strong></p>` },
    { q:'30. 动态热身与静态拉伸区别？',
      a:`<table><tr><th>维度</th><th>动态热身</th><th>静态拉伸</th></tr>
<tr><td>时机</td><td><span class="kf">训练前</span></td><td><span class="kf">训练后/休息日</span></td></tr>
<tr><td>方式</td><td>关节在活动范围内反复移动</td><td>保持一个拉伸姿势15-60秒</td></tr>
<tr><td>目的</td><td>升温+润滑+神经激活</td><td>恢复肌肉长度+放松+改善柔韧</td></tr>
<tr><td>训练前做静态拉伸？</td><td colspan="2"><span class="kf kf-bad">不建议！</span>会暂时降低肌肉力量和爆发力。</td></tr></table>` },
    { q:'31. 每个动作正确发力位置——完整表',
      a:`<table><tr><th>动作</th><th>主要发力位置</th><th>你应该感觉到的</th></tr>
<tr><td>靠墙俯卧撑</td><td>胸大肌+前三角肌+三头肌</td><td>胸肌拉伸-收缩节奏感（轻但应有）</td></tr>
<tr><td>跪式俯卧撑</td><td>胸大肌（主导）+前三角肌+三头肌</td><td>下放时胸肌拉伸，推起时胸肌收缩酸胀</td></tr>
<tr><td>前推式俯卧撑</td><td>前锯肌+上胸+核心</td><td>腋下侧方（前锯肌）酸</td></tr>
<tr><td>靠墙单边推</td><td>胸大肌（单侧）+核心抗旋</td><td>单侧胸肌孤立发力</td></tr>
<tr><td>俯卧超人</td><td>竖脊肌+臀大肌+中下斜方肌</td><td>整条后链从背到臀收紧</td></tr>
<tr><td>俯身Y-T</td><td>下斜方(Y)+菱形肌(T)+后三角肌</td><td>肩胛骨之间酸胀，不是肩膀顶端</td></tr>
<tr><td>反向平板</td><td>臀大肌+腘绳肌+中下斜方肌</td><td>后链整体紧张，臀收紧</td></tr>
<tr><td>农夫行走</td><td>前臂+斜方肌+核心</td><td>全身稳定感</td></tr>
<tr><td>深蹲</td><td>股四头肌+臀大肌</td><td>大腿前侧和臀部酸胀</td></tr>
<tr><td>保加利亚分腿蹲</td><td>前腿股四+臀，后腿髋屈肌拉伸</td><td>前腿臀和腿酸</td></tr>
<tr><td>臀桥</td><td>臀大肌（主导）+腘绳肌</td><td>臀部收紧酸胀，不是腰酸</td></tr>
<tr><td>平板支撑</td><td>腹横肌+腹直肌+肩稳定肌</td><td>核心均匀收紧，腰不塌</td></tr>
<tr><td>死虫式</td><td>腹横肌+腹斜肌</td><td>深层腹部收紧，腰贴地</td></tr>
<tr><td>墙天使</td><td>肩袖+中下斜方肌+后三角肌</td><td>大臂后侧酸，肩稳定感</td></tr>
<tr><td>下巴回收</td><td>深层颈屈肌</td><td>咽喉后方深处发力感</td></tr></table>` },
    { q:'32. 每个动作常见错误——完整表',
      a:`<table><tr><th>动作</th><th>常见错误</th><th>纠正</th></tr>
<tr><td>靠墙/跪式俯卧撑</td><td>手太窄·肘夹紧·耸肩·头前伸·太快·肘锁死·推起过度前伸肩胛</td><td>手比肩宽·肘45°·沉肩·头中立·下3秒·肘微弯·推起肩胛不过度前伸</td></tr>
<tr><td>前推式俯卧撑</td><td>前移太多塌腰</td><td>核心收紧，以不塌腰为限</td></tr>
<tr><td>靠墙单边推</td><td>身体旋转过大</td><td>核心抗旋</td></tr>
<tr><td>俯卧超人</td><td>抬头·过度挺腰·只抬手</td><td>眼看地·腹微收·同时抬胸+手脚</td></tr>
<tr><td>俯身Y-T</td><td>耸肩·用手臂拉</td><td>沉肩·用肩胛启动</td></tr>
<tr><td>反向平板</td><td>髋塌·耸肩·下巴后仰·腰酸</td><td>顶髋·沉肩·收下巴·弯腿降阶</td></tr>
<tr><td>深蹲</td><td>膝内扣·背拱·重心前倾</td><td>膝朝脚尖·背平·重心在脚跟</td></tr>
<tr><td>保加利亚分腿蹲</td><td>前膝内扣·前膝远超前脚尖</td><td>膝对脚尖·缩小步距</td></tr>
<tr><td>臀桥</td><td>用腰顶不是臀·肩胛离地</td><td>先夹臀再顶髋</td></tr>
<tr><td>平板支撑</td><td>塌腰·撅臀·头后仰·屏气</td><td>收腹臀→身体直线→看地面→呼吸</td></tr>
<tr><td>死虫式</td><td>腰拱起·太快</td><td>腰贴地→放慢→先练单侧</td></tr></table>` },
    { q:'33. 每个动作正确节奏',
      a:`<p><strong>通用黄金节奏：离心（下放）3秒→底部暂停1秒→向心（推起）1-2秒 = "3-1-1"。</strong></p>
<ul><li>俯卧撑类：下3秒→停1秒→推1秒</li>
<li>深蹲：下3秒→停1秒→上2秒</li>
<li>臀桥：顶1秒→停2秒→下3秒</li>
<li>超人：起1秒→保持2秒→下2秒</li>
<li>Y-T：抬1秒→保持1秒→下2秒</li>
<li>平板/反向平板：静态保持（均匀呼吸）</li></ul>` },
    { q:'34. 每个动作适合新手的简化版',
      a:`<table><tr><th>标准动作</th><th>新手简化版</th><th>何时进阶</th></tr>

// ======================== APP LOGIC ========================
function getTodayIdx(){const d=new Date().getDay();if(d===0)return-1;return d-1}
function weekKey(){const n=new Date();const m=new Date(n);m.setDate(n.getDate()-((n.getDay()+6)%7));return m.getFullYear()+'-'+(m.getMonth()+1)+'-'+m.getDate()}
function sk(d){return 'wo3_'+d+'_'+weekKey()}
function load(d){try{return JSON.parse(localStorage.getItem(sk(d))||'[]')}catch{return[]}}
function save(d,a){localStorage.setItem(sk(d),JSON.stringify(a))}

let cur=getTodayIdx();if(cur===-1)cur=0;
let currentTab='training';

function renderNav(){
    const nav=document.getElementById('weekNav');
    nav.innerHTML=DAYS.map((n,i)=>{
        const rest=i===6;
        const cls=(i===cur?' active':'')+(rest?' rest':'');
        return '<button class="'+cls+'" data-day="'+i+'" '+(rest?'disabled':'')+'>'+n.split(' ')[0]+'</button>';
    }).join('');
    nav.querySelectorAll('button').forEach(b=>{
        b.addEventListener('click',()=>{
            const d=+b.dataset.day;if(d===6)return;
            cur=d;renderNav();render();
        });
    });
}

function render(){
    const c=document.getElementById('content');
    if(currentTab==='training') renderTraining(c);
    else if(currentTab==='dorm') renderDorm(c);
    else if(currentTab==='injury') renderInjury(c);
    else if(currentTab==='qa') renderQA(c);
    else if(currentTab==='terms') renderTerms(c);
    else if(currentTab==='guide') renderGuide(c);
}

function buildExerciseList(items,checked,keyPrefix){
    let html='<ul class="exercise-list">';
    items.forEach((ex,i)=>{
        const k=keyPrefix+i,done=checked.includes(k);
        html+='<li class="exercise-item'+(done?' done':'')+'" data-k="'+k+'"><div class="ex-left"><span class="ex-check">'+(done?'✓':'')+'</span><span class="ex-name">'+ex.name+'</span></div><span class="ex-info">'+ex.info+'</span></li>';
        if(ex.tip)html+='<div style="font-size:0.78em;color:var(--muted);padding:0 10px 6px 42px">💡 '+ex.tip+'</div>';
        if(ex.feel)html+='<div style="font-size:0.76em;color:var(--green);padding:0 10px 6px 42px">🎯 感受：'+ex.feel+'</div>';
    });
    html+='</ul>';
    return html;
}

function renderTraining(c){
    const plan=PLANS[cur];
    if(!plan){c.innerHTML='<div class="section"><p style="text-align:center;color:var(--muted);font-size:1.1em">☀️ 周日 · 休息日</p><p style="text-align:center;color:var(--muted);font-size:0.9em">拉伸放松 · 散步 · 让身体恢复 · 可选20分钟轻拉伸</p><div class="tip-box good"><strong>✅ 休息是训练的一部分。</strong>肌肉在休息时生长。享受今天。</div><div class="tip-box info"><strong>💡 建议：</strong>今天可以做枕下肌按摩+下巴回收各2分钟，帮助体态矫正。</div></div>';return;}
    const checked=load(cur);
    const today=getTodayIdx();
    const isToday=cur===today;
    let html='';
    // Warmup
    html+='<div class="section"><h2><span class="badge b-warmup">热身</span> 训前热身（每日）</h2>';
    html+=buildExerciseList(WARMUP_BASE,checked,'wb_');
    html+='<div class="tip-box info"><strong>💡 肩伤预防：</strong>热身后加做<strong>弹力带肩外旋2×15/侧</strong>（无弹力带则手臂空画小圈）+<strong>跪姿肩胛俯卧撑2×10</strong>。详情见"肩伤康复"标签页。</div>';
    html+='</div>';
    // Leg warmup
    if(plan.legWarmup){
        html+='<div class="section"><h2><span class="badge b-legs">腿日</span> 周三额外热身</h2>';
        html+=buildExerciseList(WARMUP_LEG,checked,'wl_');
        html+='</div>';
    }
    // Chest activate
    if(plan.chestActivate){
        html+='<div class="section"><h2><span class="badge b-push">激活</span> 胸肌激活（练前必做）</h2>';
        html+=buildExerciseList(CHEST_ACTIVATE,checked,'ca_');
        html+='</div>';
    }
    // Main
    html+='<div class="section"><h2><span class="badge '+plan.badge+'">'+plan.badgeText+'</span> '+plan.dayLabel+'</h2>';
    html+='<div class="day-label">'+(isToday?'📍 今日训练':DAYS[cur])+'</div>';
    html+=buildExerciseList(plan.exercises,checked,'e_');
    html+='</div>';
    // Extra
    if(plan.extraSection){
        html+='<div class="section"><h2><span class="badge b-posture">活动</span> '+plan.extraSection.title+'</h2>';
        html+=buildExerciseList(plan.extraSection.items,checked,'es_');
        html+='</div>';
    }
    // Post routine
    if(plan.postRoutine){
        html+='<div class="section"><h2><span class="badge b-info">放松</span> 练背后必做 · 颈部放松四步</h2>';
        html+=buildExerciseList(plan.postRoutine,checked,'pr_');
        html+='</div>';
    }
    // Tips
    if(plan.tips){
        plan.tips.forEach(t=>{html+='<div class="tip-box '+t.type+'">'+t.text+'</div>';});
    }
    c.innerHTML=html;
    // Click handlers
    c.querySelectorAll('.exercise-item').forEach(el=>{
        el.addEventListener('click',()=>{
            const k=el.dataset.k;
            let arr=load(cur);
            arr=arr.includes(k)?arr.filter(x=>x!==k):[...arr,k];
            save(cur,arr);render();
        });
    });
}

function renderDorm(c){
    let html='<div class="section dorm-section"><h2><span class="badge b-dorm">🏠 宿舍</span> 宿舍友好训练动作库</h2>';
    html+='<p class="day-label">在宿舍/小空间可以做的补充训练。无需器械或只需弹力带+毛巾+水瓶。可加到拉力日或空闲日练习。</p>';
    DORM_EXERCISES.forEach(cat=>{
        html+='<div class="kb-card"><h4>'+cat.category+'</h4>';
        cat.exercises.forEach(ex=>{
            html+='<details><summary><strong>'+ex.name+'</strong> <span style="color:var(--muted);font-size:0.85em">'+ex.desc+'</span></summary><div class="inner"><p>'+ex.detail+'</p></div></details>';
        });
        html+='</div>';
    });
    html+='<div class="tip-box dorm"><strong>🏠 宿舍训练核心思路：</strong>弹力带（几十元投资）=几十个动作的可能性。毛巾+门=免费划船器。水瓶装满水=小哑铃。床=卧推凳。门框=引体向上杆。创造力是你的唯一限制。</div>';
    html+='</div>';
    c.innerHTML=html;
}

function renderInjury(c){
    let html='<div class="section injury-section"><h2><span class="badge b-injury">🩹 肩伤</span> 左肩前中束拉伤 · 恢复与预防方案</h2>';
    html+='<p class="day-label">你在做俯卧撑时左肩前中束缝隙被"扯到"。以下是完整分析+康复+预防方案。</p>';
    SHOULDER_SECTIONS.forEach(s=>{
        html+='<div class="kb-card"><h4>'+s.title+'</h4>'+s.content+'</div>';
    });
    html+='<div class="tip-box warn"><strong>⚠️ 重要提醒：</strong>以上信息基于常见训练伤害规律分析，不是医疗诊断。如果疼痛持续超过2周、夜间疼痛、或活动明显受限→请去看运动医学科/康复科医生。</div>';
    html+='</div>';
    c.innerHTML=html;
}

function renderQA(c){
    let html='<div class="section"><h2><span class="badge b-gold">详解</span> 35个关键问题完全解答</h2>';
    html+='<p class="day-label">点击问题展开。覆盖胸肌发力、练背、体态、动作、术语等全部内容。</p>';

}

function renderTerms(c){
    let html='<div class="section"><h2><span class="badge b-info">词典</span> 专业术语解释</h2>';
    html+='<p class="day-label">16个核心术语，中英文对照+白话解释。</p>';

        html+='<div class="kb-card"><h4>'+t.term+'</h4><p>'+t.def+'</p></div>';

}

function renderGuide(c){

        html+='<div class="section"><h2>'+s.title+'</h2>'+s.content+'</div>';
    });
