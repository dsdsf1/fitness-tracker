name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Build APK via PWA Builder
        run: |
          npm install -g @pwabuilder/cli
          pwabuilder package --url "https://dsdsf1.github.io/fitness-tracker/" --platform android --output ./apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 囚徒健身-APK
          path: ./apk/*.apk
